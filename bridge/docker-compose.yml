# Discord bridge service. Lives entirely in claude-mailbox/bridge/ since
# 2026-05-19 — Python package + .env + compose all colocated.
#
# Reads `.env` next to this file. See `.env.example` for required vars.
#
# Apply changes (cwd must be this directory so .env is auto-loaded):
#   cd C:/Users/User/Desktop/VSCcode/claude-mailbox/bridge
#   docker compose up -d                          # start
#   docker compose up -d --force-recreate         # apply config / .env changes
#   docker compose down                           # stop
#
# Network: shares `animesite_other-networks-main` (external) with the
# discordBot node-red container so the bridge can reach discordBot:1880
# for forwarding `agent-notify` calls (legacy path; bridge :1904/agent-notify
# is the new path).

services:
  mailbox-bridge:
    # Switched 2026-05-19 alpine -> slim: discord.py pulls aiohttp which needs
    # C extensions (mostly available as wheels on glibc, not on musl/alpine).
    # Slim is ~80MB larger but pip install resolves in seconds vs minutes.
    image: python:3.12-slim
    container_name: mailbox-bridge
    restart: always
    ports:
      - "1904:1904"
    environment:
      - TZ=Asia/Taipei
      # network has 4 node-red containers (manager / other / errorWarn / discordBot);
      # service name "nodered" can DNS-collide, so use the discordBot container name explicitly
      - NOTIFY_URL=http://discordBot:1880/agent-notify
      # Discord REST API outbound (optional). When DISCORD_BOT_TOKEN is set
      # the bridge serves /agent-notify on :1904 alongside node-red :1901
      # (same bot token works on both: REST is stateless, gateway is singleton).
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_DEFAULT_CHANNEL=${DISCORD_DEFAULT_CHANNEL:-1284065900659740773}
      # Cache pip downloads in mounted volume so container recreate doesn't re-fetch.
      - PIP_CACHE_DIR=/data/.pip-cache
    volumes:
      # This directory IS the bridge package — mount it at /app/bridge so
      # `python -m bridge` can import it. Host edits propagate on restart.
      - .:/app/bridge:ro
      # mount the ENTIRE mailbox directory (not just .db) — SQLite WAL mode needs
      # .db + .db-wal + .db-shm visible together to avoid split-brain
      - C:/Users/User/.claude/mailbox:/data
    working_dir: /app
    # Install discord.py at startup. If DISCORD_BOT_TOKEN is set, bridge will
    # spawn the gateway client thread to receive DMs. If not set, the client
    # is skipped (HTTP /from-discord webhook path still works).
    # Pin a major version to avoid surprise breaks; allow patch upgrades.
    command:
      - "bash"
      - "-c"
      - "pip install --quiet 'discord.py>=2.7,<3' && exec python -m bridge --db /data/mailbox.db --bind 0.0.0.0 --port 1904"
    networks:
      - animesite_other-networks-main

networks:
  animesite_other-networks-main:
    external: true
