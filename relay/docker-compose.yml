# mailbox-relay — spoke-side aiohttp app.
#
# Phone (on spoke's hotspot LAN) hits this; relay does:
#   - GET /list           → HTML page of MAILBOX_RECIPIENT's attachments
#   - GET /file/<id>      → streaming proxy of hub :1905/attachment/<id>
#   - POST /delete (form) → calls hub DELETE /attachment/<id> for selected ids
# Bytes pass through Python aiohttp's chunked streaming; no file lands on
# this spoke's disk.
#
# This is SPOKE-side. Hub already serves the canonical /attachment/<id> on 1905.
#
# Setup (on a spoke machine):
#   1. cp .env.example .env  (then edit values)
#   2. docker compose up -d
#   3. From phone (connected to spoke's hotspot WiFi), open browser:
#      http://<spoke-ip-on-phone-hotspot>:1906/list?token=<RELAY_TOKEN>
#
# Apply config / code changes:
#   docker compose up -d --force-recreate

services:
  mailbox-relay:
    image: python:3.12-slim
    container_name: mailbox-relay
    restart: always
    ports:
      - "${RELAY_PORT:-1906}:80"
    environment:
      - TZ=Asia/Taipei
      # Phone-side shared secret. Generate with: openssl rand -hex 24
      - RELAY_TOKEN=${RELAY_TOKEN:?RELAY_TOKEN required — see .env.example}
      # Hub address reachable from this spoke (VPN IP).
      - HUB_VPN_IP=${HUB_VPN_IP:?HUB_VPN_IP required — see .env.example}
      - HUB_PORT=${HUB_PORT:-1905}
      # Hub mailbox-server Bearer token (= spoke's CLAUDE_MAILBOX_TOKEN).
      - HUB_TOKEN=${HUB_TOKEN:?HUB_TOKEN required — see .env.example}
      # Whose attachments to list on /list (default: wiki).
      - MAILBOX_RECIPIENT=${MAILBOX_RECIPIENT:-wiki}
      # Cache pip downloads in mounted volume so container recreate is fast.
      - PIP_CACHE_DIR=/cache/pip
    volumes:
      - ./relay.py:/app/relay.py:ro
      # named volume for pip cache (host-agnostic; no mailbox.db mount needed
      # because relay never touches the DB directly — only HTTP to hub)
      - relay-pip-cache:/cache/pip
    working_dir: /app
    command:
      - "bash"
      - "-c"
      - "pip install --quiet 'aiohttp>=3.9,<4' && exec python relay.py"
    healthcheck:
      # Use 127.0.0.1 explicitly, not "localhost". Alpine/Debian /etc/hosts
      # has only ::1 by default; aiohttp here listens on 0.0.0.0:80 IPv4 only.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  relay-pip-cache:
